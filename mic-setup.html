<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Allow Microphone — Tab + Mic Recorder</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
    }

    .card {
      width: 100%;
      max-width: 420px;
      padding: 28px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid #e0e0e0;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    p {
      margin: 0 0 16px;
      font-size: 14px;
      line-height: 1.5;
      color: #616161;
    }

    button {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background: #1a73e8;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover:not(:disabled) { background: #1557b0; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .status {
      margin-top: 14px;
      font-size: 13px;
      line-height: 1.5;
      min-height: 20px;
    }

    .status.ok { color: #2e7d32; }
    .status.err { color: #c62828; }

    .hint {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #eee;
      font-size: 12px;
      color: #757575;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Allow microphone</h1>
    <p>
      Click the button below. Chrome will show a permission dialog at the top of the browser —
      choose <strong>Allow</strong>.
    </p>
    <button id="allowBtn" type="button">Allow microphone</button>
    <p id="status" class="status" aria-live="polite"></p>
    <p class="hint">
      If Chrome already shows Allow but recording still fails, open Windows Settings →
      Privacy → Microphone and make sure <strong>Google Chrome</strong> is enabled.
    </p>
  </div>
  <script src="mic-setup.js"></script>
</body>
</html>
